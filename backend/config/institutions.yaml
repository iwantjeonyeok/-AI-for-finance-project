# 국내 증권사 / 리서치 기관 평판도 설정.
# reputation_score 는 0~1. 관리자가 자유롭게 수정 가능.
# domains 는 보고서 출처 URL 의 호스트 매칭에 사용한다.
# enabled: false 인 기관의 보고서는 후보에서 제외한다.
# 알 수 없는 기관(목록에 없음)의 기본 reputation_score 는 default_reputation 을 따른다.

default_reputation: 0.5

# 국내 기관 여부가 확인되지 않으면(아래 목록에도 없고 도메인 매칭도 안 됨)
# 후보에서 제외한다. require_known_domestic=true 이면 이 규칙을 강제한다.
require_known_domestic: true

institutions:
